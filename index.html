<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="styles.css" />
		<title>Glowstone Light Network</title>
	</head>
	<body>
		<header>
			<h1>Glowstone Light Network</h1>
			<p id="stats">
				<span id="NUM-light-on">0</span> light(s) ON —
				<span id="NUM-light-off">0</span> light(s) OFF
			</p>
		</header>
		<main>
			<aside>
				<form id="ad-form" novalidate>
					<h2>Add a light</h2>
					<label for="light-name">Name (min. 3 characters)</label>
					<input
						required
						minlength="3"
						name="thenName"
						type="text"
						id="light-name"
						placeholder="e.g. Living Room"
					/>
					<span id="name-error" class="error"></span>
					<button id="btn-add-room" type="submit">Add Light</button>
				</form>
				<div id="global-controls">
					<button id="all-on">Turn All ON</button>
					<button id="all-off">Turn All OFF</button>
				</div>
			</aside>
			<section id="lights-grid"></section>
		</main>
		<script src="app.js"></script>
	</body>
</html>
